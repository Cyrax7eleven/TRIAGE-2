<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triage — Sign in</title>
  <meta name="description" content="Sign in to Triage to track, filter, and resolve your team's GitHub issues." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Ccircle cx='22' cy='9' r='6' fill='%23F0A93B'/%3E%3Ccircle cx='10' cy='32' r='6' fill='%233FB950'/%3E%3Ccircle cx='34' cy='32' r='6' fill='%23A371F7'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <main class="login-shell">
    <div class="login-card">
      <div class="login-header">
        <svg class="brand-mark" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="22" cy="9" r="6" fill="#F0A93B"/>
          <circle cx="10" cy="32" r="6" fill="#3FB950"/>
          <circle cx="34" cy="32" r="6" fill="#A371F7"/>
          <path d="M22 15 L10 26 M22 15 L34 26" stroke="#2A2F3A" stroke-width="2"/>
        </svg>
        <span class="brand-name">Triage</span>
        <p class="login-subtitle">Sign in to track, sort, and resolve<br />your team's GitHub issues.</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="login-error" id="loginError" role="alert">
          <span>⚠️</span>
          <span id="loginErrorText">Invalid username or password.</span>
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-signin" id="signInBtn">
          <span id="signInBtnText">Sign in</span>
        </button>
      </form>

      <div class="login-divider">Demo access</div>

      <div class="demo-box">
        <strong>Use these credentials to explore Triage</strong>
        <div class="demo-row"><span>Username</span><span>admin</span></div>
        <div class="demo-row"><span>Password</span><span>admin123</span></div>
        <button type="button" class="btn btn-ghost demo-fill" id="fillDemoBtn">Fill demo credentials</button>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
